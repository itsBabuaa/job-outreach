{% extends "base.html" %}
{% block title %}Subscribers - Job Digest Admin{% endblock %}
{% block content %}
<h1>Subscribers</h1>
<form method="post" action="/subscribers">
    <label>Email: <input type="email" name="email" required></label>
    <label>Skills (comma-separated): <input type="text" name="skill_set"></label>
    <button type="submit">Add Subscriber</button>
</form>
<table>
    <thead><tr><th>Email</th><th>Status</th><th>Skills</th><th>Actions</th></tr></thead>
    <tbody>
    {% for sub in subscribers %}
    <tr>
        <td>{{ sub.email }}</td>
        <td>{{ sub.status }}</td>
        <td>{{ sub.skill_set | join(', ') }}</td>
        <td>
            <a href="/subscribers/{{ sub.id }}/edit">Edit</a>
            <form method="post" action="/subscribers/{{ sub.id }}/deactivate" style="display:inline">
                <button type="submit">Deactivate</button>
            </form>
            <form method="post" action="/subscribers/{{ sub.id }}/delete" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
